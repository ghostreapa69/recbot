version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: "recbot-db"
    restart: unless-stopped
    volumes:
      - recbot-pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=recbot
      - POSTGRES_PASSWORD=recbot
      - POSTGRES_DB=recbot
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recbot -d recbot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - recbot

  recbot:
    # Build from the local source (bakes the Logto frontend into the image).
    # Without this, compose pulls the old published image with the Clerk UI.
    build:
      context: .
      dockerfile: Dockerfile
    image: ghostreaper69/recbot:local
    container_name: "recbot"
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      - traefik.http.routers.recbot.rule=Host(`your-domain-here`)
      - traefik.http.routers.recbot.entrypoints=websecure
      - traefik.http.routers.recbot.tls.certresolver=letsencrypt
      - traefik.http.services.recbot.loadbalancer.server.port=4000
    ports:
      - "4000:4000"
    environment:
      # --- Core App Configuration ---
      - NODE_ENV=production
      - PORT=4000
      - STORAGE_TYPE=aws
      - WAV_DIR=/data/wav
      - S3_FAILURE_UNHEALTHY_WINDOW_MS=60000
      - EXIT_ON_S3_FAILURE=false

      # --- PostgreSQL Database ---
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=recbot
      - DB_USER=recbot
      - DB_PASSWORD=recbot

      # --- AWS S3 (required) ---
      - AWS_ACCESS_KEY_ID=your-aws-access-key-id-here
      - AWS_SECRET_ACCESS_KEY=your-aws-secret-access-key-here
      - AWS_REGION=your-aws-region-here
      - AWS_BUCKET=your-aws-bucket-name-here

      # --- Logto Authentication ---
      # Backend: validates access tokens against this Logto tenant + API resource.
      - LOGTO_ENDPOINT=https://your-tenant.logto.app
      - LOGTO_APP_ID=your-logto-spa-app-id
      - LOGTO_API_RESOURCE=https://recbot.api
      # Optional: override the permission scopes mapped to each role
      # (defaults shown). Must match the scopes assigned to your Logto roles.
      #- LOGTO_SCOPE_ADMIN=recbot:admin
      #- LOGTO_SCOPE_MANAGER=recbot:manage
      #- LOGTO_SCOPE_MEMBER=recbot:read
      - ALLOWED_LOGIN_IDENTIFIERS=mtgpros.com
      # Frontend reads Logto config at runtime from /api/config, so the
      # REACT_APP_LOGTO_* vars below are only build-time fallbacks (baked into
      # the image at build, not read at runtime). The allowlist value IS used.
      #- REACT_APP_LOGTO_ENDPOINT=https://your-tenant.logto.app
      #- REACT_APP_LOGTO_APP_ID=your-logto-spa-app-id
      #- REACT_APP_LOGTO_API_RESOURCE=https://recbot.api
      - REACT_APP_ALLOWED_LOGIN_IDENTIFIERS=mtgpros.com

      # --- Session & Security Controls ---
      - MAX_SESSION_HOURS=4
      - MAX_INACTIVITY_MINUTES=30
      - MAX_ACTIVE_WINDOW_MIN=30

      # --- Frontend Runtime Config (if SPA served separately) ---
      - REACT_APP_API_URL=https://your-domain-here/api
      - FIVE9_TIMEZONE=America/Los_Angeles
      - REACT_APP_FIVE9_TIMEZONE=America/Los_Angeles
      - FIVE9_AUTO_INGEST_MINUTES=5
      - REPORT_TIME_DEBUG=true

      # --- Optional / Feature Flags ---
      #- EXTRA_LOGGING=true
      #- LOG_LEVEL=info

      # --- Future / Reserved Variables (uncomment as needed) ---
      #- CDN_BASE_URL=https://cdn.your-domain-here
      #- FORCE_HTTPS=true
    healthcheck:
      test: ["CMD", "node", "/app/backend/scripts/healthcheck.cjs"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 600s  # 10 min grace for SQLite migration on first boot
    restart: unless-stopped
    networks:
      - recbot
    volumes:
      # S3 bucket mounted via rclone Docker volume plugin (no FUSE needed)
      - wav_data:/data/wav
      # Mount the old SQLite volume for automatic migration on first boot.
      # The migration runs once and renames the .db file so it won't repeat.
      # After migration is confirmed, you can remove this volume mount.
      - recbot-legacy-db:/root/db
    # Uncomment to persist logs or mount local folders if needed
    # volumes (additional):
    #   - ./logs:/var/log
volumes:
  recbot-pgdata:
    driver: local
  recbot-legacy-db:
    # This is the old SQLite volume. If your old compose used a different
    # volume name (e.g. "recbot"), set it as external:
    #   external:
    #     name: recbot_recbot
    driver: local
  wav_data:
    # Local scratch volume for WAV files. The app uploads recordings to S3
    # via the AWS SDK (STORAGE_TYPE=aws), so no rclone FUSE mount is needed.
    driver: local
networks:
  recbot:
    driver: bridge